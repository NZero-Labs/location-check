services:
  db:
    image: postgres:16-alpine
    container_name: ibge-map-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ibge
      POSTGRES_PASSWORD: ibge
      POSTGRES_DB: ibge_map
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
